<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110">
  <defs>
    <!-- Gradient for icon elements (diagonal, covers icon area 5..95) -->
    <linearGradient id="gi" x1="5" y1="5" x2="95" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="40%"  stop-color="#60a5fa"/>
      <stop offset="75%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Gradient for wordmark text (horizontal, covers text area 115..490) -->
    <linearGradient id="gt" x1="115" y1="0" x2="490" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="45%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- ── Icon (scaled to 90×90 within 100×110 cell, centered vertically) ── -->
  <g transform="translate(5,10) scale(0.45)">
    <!-- Hexagon edges -->
    <polygon
      points="100,24 166,62 166,138 100,176 34,138 34,62"
      fill="none" stroke="url(#gi)" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Cluster nodes -->
    <circle cx="100" cy="24"  r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <circle cx="166" cy="62"  r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <circle cx="166" cy="138" r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <circle cx="100" cy="176" r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <circle cx="34"  cy="138" r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <circle cx="34"  cy="62"  r="9" fill="none" stroke="url(#gi)" stroke-width="3.5"/>
    <!-- DNS waves -->
    <path d="M 68 88  C 75 88  77 80  84 80  C 91 80  93 88  100 88
             C 107 88 109 96 116 96  C 123 96 125 88 132 88"
          fill="none" stroke="url(#gi)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 68 100 C 75 100 77 92  84 92  C 91 92  93 100 100 100
             C 107 100 109 108 116 108 C 123 108 125 100 132 100"
          fill="none" stroke="url(#gi)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 68 112 C 75 112 77 104 84 104 C 91 104 93 112 100 112
             C 107 112 109 120 116 120 C 123 120 125 112 132 112"
          fill="none" stroke="url(#gi)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ── Wordmark ─────────────────────────────────────────────────────── -->

  <!-- "dnsmasq" — bold, gradient fill -->
  <text
    x="115" y="64"
    font-family="'Courier New', Courier, 'Lucida Console', monospace"
    font-size="46"
    font-weight="700"
    fill="url(#gt)"
    letter-spacing="-1">dnsmasq</text>

  <!-- "CLUSTER MANAGER" — light weight, spaced capitals, muted -->
  <text
    x="118" y="87"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="300"
    fill="#94a3b8"
    letter-spacing="4">CLUSTER MANAGER</text>

  <!-- Thin separator line between icon and text -->
  <line x1="108" y1="18" x2="108" y2="92"
        stroke="#334155" stroke-width="1" opacity="0.6"/>
</svg>
